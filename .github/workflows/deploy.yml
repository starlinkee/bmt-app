name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            cd /var/www/bmt-app
            # Save checksum before pull
            OLD_LOCK=$(md5sum package-lock.json 2>/dev/null || echo "none")
            OLD_PRISMA=$(md5sum prisma/schema.prisma 2>/dev/null || echo "none")
            git pull origin master
            # Only npm ci if dependencies changed
            NEW_LOCK=$(md5sum package-lock.json 2>/dev/null || echo "changed")
            if [ "$OLD_LOCK" != "$NEW_LOCK" ]; then
              npm ci
            fi
            # Only migrate + regenerate client if schema changed
            NEW_PRISMA=$(md5sum prisma/schema.prisma 2>/dev/null || echo "changed")
            if [ "$OLD_PRISMA" != "$NEW_PRISMA" ]; then
              npx prisma migrate deploy
              npx prisma generate
            fi
            npm run build
            pm2 reload bmt-app
            sleep 3
            pm2 show bmt-app | grep -q "status.*online" || { echo "App failed to start!"; pm2 logs bmt-app --err --lines 20 --nostream; exit 1; }
